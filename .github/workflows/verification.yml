name: Verification

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "feat/**"
      - "fix/**"
      - "test/**"

jobs:
  regression:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cnvn
          POSTGRES_PASSWORD: cnvn_secret
          POSTGRES_DB: cnvn_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U cnvn -d cnvn_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://cnvn:cnvn_secret@localhost:5432/cnvn_test
      CNVN_TEST_ADMIN_DATABASE_URL: postgresql+asyncpg://cnvn:cnvn_secret@localhost:5432/postgres
      CNVN_TEST_DATABASE_URL_TEMPLATE: postgresql+asyncpg://cnvn:cnvn_secret@localhost:5432/{database}
      JWT_SECRET_KEY: ci-secret-key
      APP_ENV: test
      APP_DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run verification
        run: python scripts/verify.py --suite full
